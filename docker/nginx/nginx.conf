worker_processes auto;
pid /tmp/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  server_tokens off;
  client_max_body_size 20m;
  client_body_temp_path /tmp/client_temp;
  proxy_temp_path /tmp/proxy_temp;
  fastcgi_temp_path /tmp/fastcgi_temp;
  uwsgi_temp_path /tmp/uwsgi_temp;
  scgi_temp_path /tmp/scgi_temp;

  gzip on;
  gzip_types text/plain text/css application/json application/javascript application/xml+rss application/xml image/svg+xml;
  gzip_min_length 1024;

  upstream frontend_upstream {
    server frontend:3000;
  }

  upstream auth_service_upstream {
    server auth-service:8001;
  }

  upstream project_service_upstream {
    server project-service:8002;
  }

  upstream agent_service_upstream {
    server agent-service:8003;
  }

  upstream task_service_upstream {
    server task-service:8004;
  }

  upstream workflow_service_upstream {
    server workflow-service:8005;
  }

  upstream workflow_engine_upstream {
    server workflow-engine:8100;
  }

  upstream agent_runtime_upstream {
    server agent-runtime:8200;
  }

  upstream admin_service_upstream {
    server admin-service:8007;
  }

  server {
    listen 8080;
    server_name _;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;

    location = /health/live {
      access_log off;
      return 200 '{"status":"live","service":"edge-proxy"}';
      add_header Content-Type application/json;
    }

    # 各微服务 health/live 在根路径，非 /api/{service}/ 下
    location = /api/auth/health/live {
      proxy_pass http://auth_service_upstream/health/live;
    }
    location = /api/projects/health/live {
      proxy_pass http://project_service_upstream/health/live;
    }
    location = /api/agents/health/live {
      proxy_pass http://agent_service_upstream/health/live;
    }
    location = /api/tasks/health/live {
      proxy_pass http://task_service_upstream/health/live;
    }
    location = /api/workflows/health/live {
      proxy_pass http://workflow_service_upstream/health/live;
    }
    location = /api/executions/health/live {
      proxy_pass http://workflow_engine_upstream/health/live;
    }
    location = /api/runtime/health/live {
      proxy_pass http://agent_runtime_upstream/health/live;
    }

    # getRuntimeAnalytics 请求 /api/v1/analytics/summary（gateway 为根时）
    location = /api/v1/analytics/summary {
      proxy_pass http://agent_runtime_upstream/api/v1/analytics/summary;
    }

    location /api/auth/ {
      rewrite ^/api/auth/?(.*)$ /auth/$1 break;
      proxy_pass http://auth_service_upstream;
    }

    location = /api/auth {
      proxy_pass http://auth_service_upstream/auth;
    }

    location /api/projects/ {
      rewrite ^/api/projects/?(.*)$ /projects/$1 break;
      proxy_pass http://project_service_upstream;
    }

    location = /api/projects {
      proxy_pass http://project_service_upstream/projects;
    }

    location /api/agents/ {
      rewrite ^/api/agents/?(.*)$ /agents/$1 break;
      proxy_pass http://agent_service_upstream;
    }

    location = /api/agents {
      proxy_pass http://agent_service_upstream/agents;
    }

    # agent instances/templates/runs 使用 /agent/* 前缀（单数）
    location /api/agent/ {
      rewrite ^/api/agent/?(.*)$ /agent/$1 break;
      proxy_pass http://agent_service_upstream;
    }

    location = /api/agent {
      proxy_pass http://agent_service_upstream/agent;
    }

    location /api/tasks/ {
      rewrite ^/api/tasks/?(.*)$ /tasks/$1 break;
      proxy_pass http://task_service_upstream;
    }

    location = /api/tasks {
      proxy_pass http://task_service_upstream/tasks;
    }

    location = /api/tasks/analytics {
      proxy_pass http://task_service_upstream/tasks/analytics;
    }

    location /api/workflows/ {
      rewrite ^/api/workflows/?(.*)$ /workflows/$1 break;
      proxy_pass http://workflow_service_upstream;
    }

    location = /api/workflows {
      proxy_pass http://workflow_service_upstream/workflows;
    }

    location /api/executions/ {
      rewrite ^/api/executions/?(.*)$ /api/v1/executions/$1 break;
      proxy_pass http://workflow_engine_upstream;
    }

    location = /api/executions {
      proxy_pass http://workflow_engine_upstream/api/v1/executions;
    }

    location /api/runtime/ {
      rewrite ^/api/runtime/?(.*)$ /api/v1/$1 break;
      proxy_pass http://agent_runtime_upstream;
    }

    location /api/admin/ {
      rewrite ^/api/admin/?(.*)$ /admin/$1 break;
      proxy_pass http://admin_service_upstream;
    }

    location = /api/admin {
      proxy_pass http://admin_service_upstream/admin;
    }

    location /api/task_runs/ {
      rewrite ^/api/task_runs/?(.*)$ /task_runs/$1 break;
      proxy_pass http://workflow_service_upstream;
    }

    location = /api/task_runs {
      proxy_pass http://workflow_service_upstream/task_runs;
    }

    location /metrics/auth-service {
      proxy_pass http://auth_service_upstream/metrics;
    }

    location /metrics/project-service {
      proxy_pass http://project_service_upstream/metrics;
    }

    location /metrics/task-service {
      proxy_pass http://task_service_upstream/metrics;
    }

    location /metrics/agent-runtime {
      proxy_pass http://agent_runtime_upstream/metrics;
    }

    location / {
      proxy_pass http://frontend_upstream;
    }
  }
}
